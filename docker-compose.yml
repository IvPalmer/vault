services:
  # PostgreSQL Database
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_PASSWORD=vault_password
      - POSTGRES_USER=vault_user
      - POSTGRES_DB=vault
    ports:
      - "5432:5432"
    restart: always

  # Django Backend
  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
    environment:
      - DEBUG=1
      # SECRET_KEY is now auto-generated if not set (see settings.py)
      # - SECRET_KEY=your-secret-here
      - POSTGRES_DB=vault
      - POSTGRES_USER=vault_user
      - POSTGRES_PASSWORD=vault_password
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - ALLOWED_HOSTS=localhost,127.0.0.1,192.168.15.2
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173,http://localhost:5175,http://127.0.0.1:5175,http://192.168.15.2:5175,http://192.168.15.2:8001
      - PLUGGY_CLIENT_ID=${PLUGGY_CLIENT_ID:-}
      - PLUGGY_CLIENT_SECRET=${PLUGGY_CLIENT_SECRET:-}
      - PLUGGY_ITEM_ID=${PLUGGY_ITEM_ID:-}
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
      - ./FinanceDashboard:/app/legacy_data
      - static_volume:/app/staticfiles
    command: python manage.py runserver 0.0.0.0:8001

  # React Frontend (dev mode)
  frontend:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: npm run dev -- --host
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
  node_modules:
