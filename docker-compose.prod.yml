services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - vault_postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      PLUGGY_CLIENT_ID: ${PLUGGY_CLIENT_ID}
      PLUGGY_CLIENT_SECRET: ${PLUGGY_CLIENT_SECRET}
      PLUGGY_PROFILES: ${PLUGGY_PROFILES:-}
      # Shared secret authorizing the chat-sidecar's server-to-server calls
      # (X-Internal-Token). The API requires auth (JWT) for everyone else.
      VAULT_INTERNAL_TOKEN: ${VAULT_INTERNAL_TOKEN:-}
    volumes:
      - vault_static:/app/staticfiles
      - vault_secrets:/app/secrets
    entrypoint: ["sh", "/app/entrypoint.sh"]

  chat-sidecar:
    build: ./chat-sidecar
    restart: always
    depends_on:
      - backend
    environment:
      VAULT_API: http://backend:8000
      VAULT_API_URL: http://backend:8000/api
      VAULT_API_HOST: ${VAULT_API_HOST:-vault.grooveops.dev}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Must match the backend's VAULT_INTERNAL_TOKEN so server-to-server
      # API calls authenticate (X-Internal-Token).
      VAULT_INTERNAL_TOKEN: ${VAULT_INTERNAL_TOKEN:-}
    volumes:
      - vault_chat_memory:/app/memory
      # Subscription auth: bind-mount Claude Code OAuth credentials from host.
      # Create on the VPS by extracting the JSON from your Mac keychain:
      #   security find-generic-password -s "Claude Code-credentials" -a "$USER" -w
      # then upload it to /etc/dokploy/secrets/vault-claude.json on the VPS.
      # Path lives outside the git checkout so deploys do not wipe it.
      # rw so the claude CLI can persist refreshed access tokens.
      - ${CLAUDE_CREDS_PATH:-/etc/dokploy/secrets/vault-claude.json}:/home/sidecar/.claude/.credentials.json

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    depends_on:
      - backend
      - chat-sidecar
    volumes:
      # Exam media (e.g. the ultrasound video) served as static files with
      # native nginx byte-range support — reliable <video> playback without the
      # streaming proxy. Host path lives outside the git checkout, so the media
      # is not baked into the image/history and survives deploys.
      - ${EXAM_MEDIA_PATH:-/home/ubuntu/vault-exam-media}:/usr/share/nginx/exam-media:ro

  cron:
    build: ./backend
    restart: always
    depends_on:
      - db
      - backend
    environment:
      DEBUG: "0"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      PLUGGY_CLIENT_ID: ${PLUGGY_CLIENT_ID}
      PLUGGY_CLIENT_SECRET: ${PLUGGY_CLIENT_SECRET}
      SYNC_PROFILES: ${SYNC_PROFILES:-Palmer,Rafa}
      SYNC_SCHEDULE: ${SYNC_SCHEDULE:-0 8 * * *}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apt-get update -qq && apt-get install -y -qq cron > /dev/null 2>&1
        echo "$$SYNC_SCHEDULE cd /app && python manage.py sync_pluggy --profile Palmer --save-balance >> /proc/1/fd/1 2>&1" > /tmp/crontab
        echo "$$SYNC_SCHEDULE cd /app && python manage.py sync_pluggy --profile Rafa --save-balance >> /proc/1/fd/1 2>&1" >> /tmp/crontab
        # Reconcile Pluggy installments after each sync: correct invoice_month
        # from the authoritative billId, then remove re-listed duplicates.
        echo "15 8 * * * cd /app && python manage.py rebucket_invoice_month --apply >> /proc/1/fd/1 2>&1" >> /tmp/crontab
        echo "20 8 * * * cd /app && python manage.py dedup_installments --apply >> /proc/1/fd/1 2>&1" >> /tmp/crontab
        # Phantom-duplicate sentinel: runs 30 minutes after each Pluggy sync.
        # Logs counts; exits 1 if rows > 5 OR value > R$500 so cron logs flag regressions.
        echo "30 8 * * * cd /app && python manage.py check_phantom_duplicates --max-rows 5 --max-value 500 >> /proc/1/fd/1 2>&1" >> /tmp/crontab
        crontab /tmp/crontab
        echo "cron started: $$SYNC_SCHEDULE"
        cron -f

volumes:
  vault_postgres_data:
  vault_static:
  vault_secrets:
  vault_chat_memory:
