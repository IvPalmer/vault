services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - vault_postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    depends_on:
      - db
    environment:
      DEBUG: "0"
      SECRET_KEY: ${SECRET_KEY:-}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      PLUGGY_CLIENT_ID: ${PLUGGY_CLIENT_ID}
      PLUGGY_CLIENT_SECRET: ${PLUGGY_CLIENT_SECRET}
      PLUGGY_PROFILES: ${PLUGGY_PROFILES:-}
    volumes:
      - vault_static:/app/staticfiles
      - vault_secrets:/app/secrets
    entrypoint: ["sh", "/app/entrypoint.sh"]

  chat-sidecar:
    build: ./chat-sidecar
    restart: always
    depends_on:
      - backend
    environment:
      VAULT_API: http://backend:8000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - vault_chat_memory:/app/memory
      # Subscription auth: bind-mount Claude Code OAuth credentials from host.
      # Create on the VPS by extracting the JSON from your Mac keychain:
      #   security find-generic-password -s "Claude Code-credentials" -a "$USER" -w
      # then scp it to ${CLAUDE_CREDS_PATH:-./claude-credentials.json} on the VPS.
      - ${CLAUDE_CREDS_PATH:-./claude-credentials.json}:/home/sidecar/.claude/.credentials.json:ro

  web:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always
    depends_on:
      - backend
      - chat-sidecar

  cron:
    build: ./backend
    restart: always
    depends_on:
      - db
      - backend
    environment:
      DEBUG: "0"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      PLUGGY_CLIENT_ID: ${PLUGGY_CLIENT_ID}
      PLUGGY_CLIENT_SECRET: ${PLUGGY_CLIENT_SECRET}
      SYNC_PROFILES: ${SYNC_PROFILES:-Palmer,Rafa}
      SYNC_SCHEDULE: ${SYNC_SCHEDULE:-0 8 * * *}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apt-get update -qq && apt-get install -y -qq cron > /dev/null 2>&1
        echo "$$SYNC_SCHEDULE cd /app && python manage.py sync_pluggy --profile Palmer --save-balance >> /proc/1/fd/1 2>&1" > /tmp/crontab
        echo "$$SYNC_SCHEDULE cd /app && python manage.py sync_pluggy --profile Rafa --save-balance >> /proc/1/fd/1 2>&1" >> /tmp/crontab
        crontab /tmp/crontab
        echo "cron started: $$SYNC_SCHEDULE"
        cron -f

volumes:
  vault_postgres_data:
  vault_static:
  vault_secrets:
  vault_chat_memory:
