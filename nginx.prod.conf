server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # Hashed bundles are immutable — cache hard. Everything else (notably
    # index.html) must revalidate on every load, otherwise browsers cache the
    # SPA heuristically and users keep running a stale bundle after deploys.
    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Exam media (ultrasound video, etc.) — static files with native nginx
    # byte-range support, so the <video> element plays/seeks reliably (no
    # streaming proxy). Mounted read-only from a host path; not in git/image.
    location /exam-media/ {
        alias /usr/share/nginx/exam-media/;
        add_header Cache-Control "private, max-age=86400";
    }

    # Video streaming proxy — must bypass nginx buffering so the browser's
    # <video> element gets a live byte stream instead of an 8 MB chunk
    # buffered to a temp file first (which stalls playback). ^~ wins over the
    # regex location below. Mirrors the /sidecar/ streaming config.
    location ^~ /api/google/drive/stream/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Defense in depth: the internal service token must only come from the
        # sidecar over the docker network, never from a public client.
        proxy_set_header X-Internal-Token "";
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 600s;
    }

    location ~ ^/(api|admin|static|media)/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Strip any client-supplied internal token (see above).
        proxy_set_header X-Internal-Token "";
        proxy_read_timeout 120s;
    }

    location /sidecar/ {
        proxy_pass http://chat-sidecar:5178/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }
}
